name: Update Maersk schedules

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Write maersk-raw.json for mapping checks'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch Maersk schedules
        env:
          MAERSK_API_KEY: ${{ secrets.MAERSK_API_KEY }}
        run: |
          if [ "${{ inputs.debug }}" = "true" ]; then
            node scripts/fetch-maersk.mjs --debug
          else
            node scripts/fetch-maersk.mjs
          fi
      - name: Commit changes
        run: |
          git config user.name  "sailingi-bot"
          git config user.email "actions@users.noreply.github.com"
          git add sailings.csv maersk-raw.json 2>/dev/null || git add sailings.csv
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh Maersk schedules ($(date -u +%Y-%m-%d))"
            git push
          fi
